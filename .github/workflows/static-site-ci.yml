name: Static Site CI

on:
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: static-site/package-lock.json

      - name: Install dependencies
        run: npm --prefix static-site ci

      - name: Build and validate
        run: npm --prefix static-site run test
