name: Static Site CI

on:
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: static-site/package-lock.json

      - name: Install dependencies
        run: npm --prefix static-site ci

      - name: Build and validate
        run: npm --prefix static-site run test
